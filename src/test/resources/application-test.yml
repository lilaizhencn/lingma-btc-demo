server:
  port: 0  # 随机端口

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        hbm2ddl:
          auto: create-drop
        jdbc:
          batch_size: 50

  h2:
    console:
      enabled: false

# Bitcoin配置
bitcoin:
  network: testnet
  network-switch:
    enabled: true
    default-network: testnet
  node:
    rpc:
      url: http://localhost:18332
      username: rpcuser
      password: rpcpassword
  fee:
    min-rate: 1000
    max-rate: 100000
    default-rate: 5000

# 钱包配置
wallet:
  supported-coins: btc,ltc,dash,doge
  change-address:
    use-hot-wallet: true
  hot-wallet:
    address-index: 0

# 安全配置
security:
  encryption:
    password: test_wallet_password
  root-key-password: test_root_key_password_for_testing_only
  hsm:
    enabled: false
    provider: softhsm

# 币种配置
coins:
  btc:
    name: Bitcoin
    symbol: BTC
    coin-type:
      mainnet: 0
      testnet: 1
    hrp-prefix:
      mainnet: bc
      testnet: tb
  ltc:
    name: Litecoin
    symbol: LTC
    coin-type:
      mainnet: 2
      testnet: 1
    hrp-prefix:
      mainnet: lt
      testnet: tlt
  dash:
    name: Dash
    symbol: DASH
    coin-type:
      mainnet: 5
      testnet: 1
    hrp-prefix:
      mainnet: dash
      testnet: tdash
  doge:
    name: Dogecoin
    symbol: DOGE
    coin-type:
      mainnet: 3
      testnet: 1
    hrp-prefix:
      mainnet: doge
      testnet: tdge

# 日志配置
logging:
  level:
    com.btc: INFO
    org.springframework: WARN
    org.hibernate: WARN